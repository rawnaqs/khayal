<!DOCTYPE html>
<html lang="en">

    <style>

            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #1a1a1a;
            color: #e8b86d;
            min-height: 100vh;
            display: flex;
