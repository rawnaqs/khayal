
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,700;1,300&family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,400;12..96,600;12..96,800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070707;--s1:#0d0d0d;--s2:#141414;--s3:#1c1c1c;
  --border:rgba(255,255,255,0.05);--border2:rgba(255,255,255,0.09);
  --gold:#C9933A;--gl:#E8B86D;
  --text:#f5f5f5;--t2:rgba(245,245,245,0.5);--t3:rgba(245,245,245,0.2);
  --ok:#3ddc84;
  --mono:'IBM Plex Mono',monospace;
}
body{
  background:#040404;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;padding:32px 16px;
  font-family:'Bricolage Grotesque',sans-serif;
}

.bento{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  width:340px;
}

/* ── Base tile ── */
.bt{
  background:var(--s2);
  border:1px solid var(--border);
  border-radius:18px;
  padding:15px;
  position:relative;
  overflow:hidden;
}
.bt.wide{ grid-column:1/3 }
.lbl{
  font-family:var(--mono);font-size:9px;
  color:var(--t3);letter-spacing:1.5px;
  text-transform:uppercase;margin-bottom:8px;
}

/* ── STREAK tile ── */
.bt-streak{
  background:linear-gradient(145deg,rgba(201,147,58,0.1) 0%,rgba(201,147,58,0.02) 100%);
  border-color:rgba(201,147,58,0.18);
}

.streak-body{display:flex;align-items:center;gap:12px}

/* arc */
.arc{position:relative;width:58px;height:58px;flex-shrink:0}
.arc svg{width:58px;height:58px;transform:rotate(-90deg)}
.arc-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
.arc-n{font-size:17px;font-weight:800;color:var(--gold);line-height:1;letter-spacing:-1px}
.arc-u{font-family:var(--mono);font-size:7px;color:var(--t3);letter-spacing:0.5px}

/* streak right */
.streak-right{flex:1;min-width:0}
.streak-num{font-size:26px;font-weight:800;color:var(--text);line-height:1;letter-spacing:-1.5px}
.streak-unit{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:1px}
.streak-goal{font-family:var(--mono);font-size:9px;color:var(--gold);margin-top:4px;display:flex;align-items:center;gap:4px}
.streak-goal-fire{font-size:10px}

/* week dots */
.week-dots{display:flex;gap:4px;margin-top:10px}
.wd{
  flex:1;height:5px;border-radius:100px;
  background:rgba(255,255,255,0.06);
}
.wd.on{background:var(--gold)}
.wd.today{background:var(--gl);box-shadow:0 0 6px rgba(232,184,109,0.5)}
.wd.off{background:rgba(255,255,255,0.04)}

/* ── TODAY tile ── */
.today-num{font-size:32px;font-weight:800;color:var(--text);line-height:1;letter-spacing:-2px}
.today-sub{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:2px;margin-bottom:10px}

/* hourly mini bars */
.hours{display:flex;align-items:flex-end;gap:2px;height:32px}
.hb{
  flex:1;border-radius:2px 2px 0 0;
  background:rgba(201,147,58,0.18);
  min-height:2px;
  transition:height 0.4s ease;
}
.hb.hi{background:var(--gold)}
.hb.now{background:var(--gl);box-shadow:0 0 5px rgba(232,184,109,0.4);border-radius:2px}
.hb.empty{background:rgba(255,255,255,0.04)}

.today-footer{
  display:flex;justify-content:space-between;
  margin-top:6px;padding-top:6px;
  border-top:1px solid var(--border);
}
.tf-stat{font-family:var(--mono);font-size:9px;color:var(--t3)}
.tf-stat span{color:var(--t2)}

/* ── VAULT wide tile ── */
.vault-inner{
  display:flex;align-items:center;
  justify-content:space-between;gap:10px;
}
.vault-left{}
.vault-num{font-size:26px;font-weight:800;color:var(--text);line-height:1;letter-spacing:-1.5px}
.vault-unit{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:1px}
.vault-delta{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:5px;
  font-family:var(--mono);font-size:9px;font-weight:700;
  color:var(--ok);
  background:rgba(61,220,132,0.08);
  border:1px solid rgba(61,220,132,0.15);
  border-radius:100px;padding:2px 7px;
}

.vault-center{display:flex;flex-direction:column;gap:3px;flex:1;align-items:center}
.vc-stat{font-family:var(--mono);font-size:9px;color:var(--t3);text-align:center}
.vc-stat span{color:var(--t2);display:block;font-size:11px;font-weight:600;letter-spacing:-0.3px;margin-top:1px}

/* 7-day sparkline */
.spark{display:flex;align-items:flex-end;gap:3px;height:28px}
.sb-bar{width:6px;border-radius:2px 2px 0 0;min-height:2px}
.sb-bar.today{background:var(--gold);box-shadow:0 0 6px rgba(201,147,58,0.3)}
.sb-bar.prev{background:rgba(201,147,58,0.25)}
</style>

<div class="bento">

  <!-- ── STREAK ── -->
  <div class="bt bt-streak">
    <div class="lbl">streak</div>
    <div class="streak-body">
      <div class="arc">
        <svg viewBox="0 0 58 58">
          <circle fill="none" stroke="rgba(255,255,255,0.05)"
            stroke-width="5" stroke-linecap="round"
            cx="29" cy="29" r="23"
            transform="rotate(-90 29 29)"/>
          <circle fill="none" stroke="url(#grad)"
            stroke-width="5" stroke-linecap="round"
            cx="29" cy="29" r="23"
            stroke-dasharray="144"
            stroke-dashoffset="36"
            transform="rotate(-90 29 29)"/>
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#C9933A"/>
              <stop offset="100%" stop-color="#E8B86D"/>
            </linearGradient>
          </defs>
        </svg>
        <div class="arc-center">
          <span class="arc-n">12</span>
          <span class="arc-u">days</span>
        </div>
      </div>
      <div class="streak-right">
        <div class="streak-num">12</div>
        <div class="streak-unit">day streak</div>
        <div class="streak-goal">
          <span class="streak-goal-fire">🔥</span>
          4 days to 16
        </div>
      </div>
    </div>
    <div class="week-dots">
      <div class="wd on"></div>
      <div class="wd on"></div>
      <div class="wd on"></div>
      <div class="wd on"></div>
      <div class="wd on"></div>
      <div class="wd on"></div>
      <div class="wd today"></div>
    </div>
  </div>

  <!-- ── TODAY ── -->
  <div class="bt">
    <div class="lbl">today</div>
    <div class="today-num">7</div>
    <div class="today-sub">captures</div>
    <div class="hours">
      <div class="hb empty" style="height:8%"></div>
      <div class="hb empty" style="height:8%"></div>
      <div class="hb empty" style="height:8%"></div>
      <div class="hb empty" style="height:8%"></div>
      <div class="hb empty" style="height:8%"></div>
      <div class="hb empty" style="height:8%"></div>
      <div class="hb" style="height:30%"></div>
      <div class="hb" style="height:15%"></div>
      <div class="hb hi" style="height:100%"></div>
      <div class="hb" style="height:55%"></div>
      <div class="hb hi" style="height:80%"></div>
      <div class="hb" style="height:40%"></div>
      <div class="hb" style="height:55%"></div>
      <div class="hb now" style="height:35%"></div>
      <div class="hb empty" style="height:8%"></div>
      <div class="hb empty" style="height:8%"></div>
    </div>
    <div class="today-footer">
      <span class="tf-stat">avg <span>5.2/day</span></span>
      <span class="tf-stat">last <span>14m ago</span></span>
    </div>
  </div>

  <!-- ── VAULT wide ── -->
  <div class="bt wide">
    <div class="lbl">vault</div>
    <div class="vault-inner">
      <div class="vault-left">
        <div class="vault-num">2,847</div>
        <div class="vault-unit">notes</div>
        <div class="vault-delta">+8 today</div>
      </div>
      <div class="vault-center">
        <div class="vc-stat">best day<span>14</span></div>
        <div class="vc-stat">this week<span>34</span></div>
      </div>
      <div class="spark">
        <div class="sb-bar prev" style="height:40%"></div>
        <div class="sb-bar prev" style="height:65%"></div>
        <div class="sb-bar prev" style="height:35%"></div>
        <div class="sb-bar prev" style="height:80%"></div>
        <div class="sb-bar prev" style="height:55%"></div>
        <div class="sb-bar prev" style="height:70%"></div>
        <div class="sb-bar today" style="height:100%"></div>
      </div>
    </div>
  </div>

</div>
