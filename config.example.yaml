vault:
  path: ~/Documents/brain
  inbox_dir: khayal
  media:
    default_dir: media
    strategy:
      image: vault
      pdf: vault
      audio: config
      video: config

server:
  host: 127.0.0.1
  port: 1133
  token: "" # Auto-generated on first run
  max_text_body_mb: 1
  max_image_body_mb: 10
  shutdown_timeout_s: 30

llm:
  provider: ollama
  ollama_host: http://localhost:11434
  embed_model: nomic-embed-text
  text_model: llama3.2:3b
  vision_model: moondream
  fallback_provider: ""
  fallback_api_key: ""
  truncate_text_tokens: 2000
  truncate_image_tokens: 3000
  truncate_article_tokens: 12000
  max_llm_concurrency: 4
  temperature: 0.7

worker:
  max_workers: 1
  max_retries: 3
  retry_backoff: exponential

db:
  path: khayal.db

search:
  max_results: 50
  max_excerpt: 500
  rrf_k: 60
  min_semantic_score: 0.5

log:
  level: info
  worker_level: info
  file: logs/khayal.log
  rotation_max_size_mb: 10
  rotation_max_files: 5
