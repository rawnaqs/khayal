vault:
  path: ./vault
  inbox_dir: khayal
  media:
    default_dir: media
    strategy:
      image: vault
      pdf: vault
      audio: config
      video: config

server:
  host: 0.0.0.0
  port: 1133
  token: "abc"

llm:
  provider: ollama
  ollama_host: http://0.0.0.0:11434
  embed_model: nomic-embed-text
  text_model: qwen2.5:3b
  vision_model: moondream
  fallback_provider: ""
  fallback_api_key: ""
  truncate_text_tokens: 2000
  truncate_image_tokens: 3000
  truncate_article_tokens: 12000

worker:
  max_workers: 5
  max_retries: 3
  retry_backoff: exponential

search:
  max_results: 50
  max_excerpt: 500
  rrf_k: 60
  min_semantic_score: 0.5

log:
  level: debug
  worker_level: debug
  file: ./logs/khayal.log
  rotation_max_size_mb: 10
  rotation_max_files: 5

db:
  path: khayal.db
