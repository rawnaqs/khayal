vault:
  path: testdata/vault
  inbox_dir: inbox
  media:
    default_dir: inbox/media
    strategy:
      image: vault
      pdf: vault
      audio: config
      video: config

server:
  host: 127.0.0.1
  port: 7766
  token: "abc"
  log_file: ~/.config/khayal/logs/khayal.log

llm:
  provider: ollama
  ollama_host: http://localhost:11434
  embed_model: nomic-embed-text
  text_model: qwen2.5:3b
  vision_model: moondream
  fallback_provider: ""
  fallback_api_key: ""

worker:
  max_workers: 1
  max_retries: 3
  retry_backoff: exponential

search:
  max_results: 50
  max_excerpt: 500
  rrf_k: 60
  min_semantic_score: 0.5

db:
  path: testdata/khayal.db
