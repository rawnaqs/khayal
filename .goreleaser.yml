version: 2

project_name: khayal

before:
  hooks:
    - npm --prefix external/react version {{.Version}} --no-git-tag-version --allow-same-version
    - npm --prefix external/react ci
    - npm --prefix external/react run build

builds:
  - id: khayal
    main: ./cmd/khayal
    binary: khayal
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/rawnaqs/khayal/internal/version.Version={{.Version}}

  - id: kl
    main: ./cmd/kl
    binary: kl
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - id: khayal
    ids:
      - khayal
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

  - id: kl
    ids:
      - kl
    name_template: "{{ .ProjectName }}-client_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: rawnaqs
    name: khayal
  draft: false
  prerelease: auto

homebrew_casks:
  - name: khayal
    ids: [khayal]
    repository:
      owner: rawnaqs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/rawnaqs/khayal"
    description: "Your private treasury of thought. Local, secure, yours."
    license: "AGPL-3.0"
    service: |
      do
        run [opt_bin/"khayal", "start"]
        keep_alive true
      end

  - name: kl
    ids: [kl]
    repository:
      owner: rawnaqs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/rawnaqs/khayal"
    description: "Khayal CLI client — capture, search, status."
    license: "AGPL-3.0"

dockers_v2:
  - images:
      - "ghcr.io/rawnaqs/khayal"
    tags:
      - "v{{ .Version }}"
      - "latest"
    platforms: [linux/amd64, linux/arm64]
    dockerfile: Dockerfile.release
